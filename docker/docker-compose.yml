services:
  notebook:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        CUDA_IMAGE_TAG: "${CUDA_IMAGE_TAG:-12.9.1-cudnn-runtime-ubuntu24.04}"
        ENABLE_RAPIDS: "${ENABLE_RAPIDS:-0}"
        REQUIREMENTS_MODE: "${REQUIREMENTS_MODE:-freeze}"
    image: tech-app-devoir-ii:latest
    working_dir: /workspace
    volumes:
      - ..:/workspace
      - data:/workspace/data
      - pip-cache:/root/.cache/pip
      - hf-cache:/root/.cache/huggingface
    ports:
      - "${JUPYTER_PORT:-8888}:8888"
    environment:
      PYTHONUNBUFFERED: "1"
      MPLBACKEND: "Agg"
      TZ: "${TZ:-Etc/UTC}"
      JUPYTER_TOKEN: "${JUPYTER_TOKEN:-techapp}"
      NVIDIA_VISIBLE_DEVICES: "${NVIDIA_VISIBLE_DEVICES:-all}"
      NVIDIA_DRIVER_CAPABILITIES: "${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}"
      NVIDIA_DISABLE_REQUIRE: "${NVIDIA_DISABLE_REQUIRE:-1}"
    gpus:
      - driver: nvidia
        count: all
        capabilities: [compute, utility]
    command: >
      bash -lc "jupyter lab
      --ip=0.0.0.0
      --port=8888
      --no-browser
      --NotebookApp.token=${JUPYTER_TOKEN:-techapp}
      --NotebookApp.allow_origin='*'
      --allow-root"

volumes:
  pip-cache:
  hf-cache:
  data: